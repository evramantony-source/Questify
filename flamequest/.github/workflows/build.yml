name: Build FlameQuest

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you trigger it manually from GitHub's website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup Gradle wrapper
        run: gradle wrapper --gradle-version=8.1.1
        
      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: flamequest-jar
          path: build/libs/flamequest-*.jar
          if-no-files-found: error
